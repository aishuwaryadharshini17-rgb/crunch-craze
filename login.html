<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Crunch Craze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="image/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page login-only-page">
    <main>
      <section class="login-page" aria-labelledby="login-heading">
        <a class="login-brand" href="index.html" aria-label="Crunch Craze home">
          <img class="logo" src="image/logo.png" alt="Crunch Craze logo">
          <div class="brand-text">
            <div class="brand-name">Crunch Craze</div>
            <div class="brand-tag">Specialty popcorn & snack boxes</div>
          </div>
        </a>

        <div class="login-visual reveal-on-scroll">
          <img src="image/a1.jpg" alt="Crunchy popcorn snack cup">
          <div class="login-badge">&#127873; Fresh rewards await</div>
        </div>

        <div class="login-card reveal-on-scroll">
          <p class="section-kicker">Welcome Back</p>
          <h1 id="login-heading">Login</h1>
          <p class="login-subtitle">Login to manage your snack box, plans, rewards, and monthly deliveries.</p>

          <form class="signin-form">
            <div class="form-row">
              <label for="login-email">Email Address</label>
              <input id="login-email" type="email" placeholder="Enter your email">
            </div>

            <div class="form-row">
              <label for="login-password">Password</label>
              <input id="login-password" type="password" placeholder="Enter your password">
            </div>

            <div class="login-options">
              <label class="remember-option">
                <input type="checkbox">
                <span>Remember me</span>
              </label>
              <a href="#">Forgot Password?</a>
            </div>

            <button class="button primary" type="submit">Login</button>
          </form>

          <p class="signup-note">New to CrunchCraze? <a href="signin.html">Create Account</a></p>
          <a class="back-home-link" href="index.html">Back to Home</a>
        </div>
      </section>
    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
