<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Crunch Craze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="icon" type="image/png" href="image/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-only-page signin-auth-page">
  <main class="login-page" aria-labelledby="signin-heading">
    <div class="page-tools" aria-label="Page display controls">
      <button class="dark-toggle" type="button" aria-label="Switch to dark mode"><i class="cc-icon cc-icon-moon"
          aria-hidden="true"></i></button>
      <button class="rtl-toggle" type="button" aria-label="Switch to RTL layout">RTL</button>
    </div>

    <section class="login-card auth-card register-card">
      <a class="login-brand auth-logo" href="index.html" aria-label="Crunch Craze home">
        <img class="logo" src="image/logo.png" alt="Crunch Craze logo">
      </a>

      <h1 id="signin-heading">Register</h1>
      <p class="auth-subtitle">Create an account to start your delicious snack journey.</p>

      <form class="signin-form">
        <label class="sr-only" for="signin-name">Full Name</label>
        <input id="signin-name" type="text" placeholder="Full Name" autocomplete="name">

        <label class="sr-only" for="signin-email">Email Address</label>
        <input id="signin-email" type="email" placeholder="Email Address" autocomplete="email">

        <label class="sr-only" for="signin-password">Password</label>
        <div class="password-field">
          <input id="signin-password" type="password" placeholder="Password" autocomplete="new-password">
          <button type="button" aria-label="Show password">◎</button>
        </div>

        <label class="sr-only" for="signin-confirm">Confirm Password</label>
        <div class="password-field">
          <input id="signin-confirm" type="password" placeholder="Confirm Password" autocomplete="new-password">
          <button type="button" aria-label="Show password">◎</button>
        </div>

        <label class="remember-option terms-option">
          <input type="checkbox">
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </label>

        <button class="button primary" type="submit">Register</button>
      </form>

      <p class="auth-divider">Or register with</p>
      <div class="auth-social" aria-label="Social login options">

        <a href="#" aria-label="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>

        <a href="#" aria-label="Google">
          <i class="fa-brands fa-google"></i>
        </a>

        <a href="#" aria-label="Twitter">
          <i class="fa-brands fa-x-twitter"></i>
        </a>

        <a href="#" aria-label="Apple">
          <i class="fa-brands fa-apple"></i>
        </a>

      </div>

      <p class="signup-note">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>

</html>
